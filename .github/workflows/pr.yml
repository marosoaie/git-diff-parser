name: PR checks

on:
  pull_request:

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tests-and-diagnostics:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # reach the merge base
          lfs: true        # real payloads for the LFS test fixtures

      - name: Select newest Xcode (Swift 6.2+ required)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          swift --version

      # Same tree for diff and build, so line numbers can't drift.
      - name: Diff against base
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}...HEAD" > /tmp/pr.diff

      - uses: actions/cache@v6
        with:
          path: |
            .build
            ~/Library/Caches/git-diff-parser-tests
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved') }}

      - name: Build (capture compiler diagnostics)
        run: |
          set -o pipefail
          swift build --build-tests 2>&1 | tee /tmp/build.log

      - name: Run tests
        run: swift test --skip-build

      - name: SwiftLint
        if: ${{ !cancelled() }}
        run: |
          set -o pipefail
          which swiftlint || brew install swiftlint
          swiftlint lint --quiet | tee /tmp/swiftlint.log

      # Annotate diagnostics on PR-touched lines; fail on new warnings there.
      - name: Fail on new warnings in changed lines
        if: always()
        run: |
          touch /tmp/build.log /tmp/swiftlint.log
          status=0
          .build/debug/git-diff-parser filter /tmp/build.log \
            --diff /tmp/pr.diff \
            --tool xcodebuild \
            --format github \
            --fail-on warning || status=1
          .build/debug/git-diff-parser filter /tmp/swiftlint.log \
            --diff /tmp/pr.diff \
            --tool swiftlint \
            --format github \
            --fail-on warning || status=1
          exit $status