name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release, e.g. 1.2.0 (must match the CLI's --version)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true   # real payloads for the LFS test fixtures

      - name: Select newest Xcode (Swift 6.2+ required)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          swift --version

      - name: Validate version
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "'$VERSION' is not MAJOR.MINOR.PATCH"; exit 1; }
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "tag v$VERSION already exists"; exit 1
          fi

      - name: Run tests
        run: swift test

      - name: Build arm64 binary
        run: swift build -c release

      # The hard-coded CLI version is bumped via PR; releasing anything else
      # is a mistake.
      - name: Binary version must match the release
        run: |
          actual="$(.build/release/git-diff-parser --version)"
          [[ "$actual" == "$VERSION" ]] || { echo "--version prints $actual, expected $VERSION"; exit 1; }

      - name: Package
        run: |
          name="git-diff-parser-$VERSION-macos-arm64"
          mkdir dist
          cp .build/release/git-diff-parser dist/
          cd dist
          zip -q "$name.zip" git-diff-parser
          shasum -a 256 "$name.zip" > "$name.zip.sha256"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --generate-notes \
            dist/*.zip dist/*.sha256

      # Pins Formula/git-diff-parser.rb in marosoaie/homebrew-tap to this
      # release. Requires the TAP_DEPLOY_KEY secret (a write deploy key on
      # the tap repo); skips quietly when it is not configured.
      - name: Bump Homebrew formula
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          if [ -z "$TAP_DEPLOY_KEY" ]; then
            echo "TAP_DEPLOY_KEY secret not set; skipping formula bump"
            exit 0
          fi
          umask 077
          printf '%s\n' "$TAP_DEPLOY_KEY" > /tmp/tap_deploy_key
          export GIT_SSH_COMMAND="ssh -i /tmp/tap_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@github.com:marosoaie/homebrew-tap.git /tmp/tap
          cd /tmp/tap
          sed -E -i '' \
            -e 's|(tag:[[:space:]]*)"v[^"]*"|\1"v'"$VERSION"'"|' \
            -e 's|(revision:[[:space:]]*)"[0-9a-f]*"|\1"'"$GITHUB_SHA"'"|' \
            Formula/git-diff-parser.rb
          if git diff --quiet; then
            echo "formula already at v$VERSION"
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -qam "git-diff-parser $VERSION"
          git push -q
